name: chat_setup
description: A modern social platform — Chat, Posts, Stories, Channels, Groups & more.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.2.3

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # DI
  get_it: ^9.2.1
  injectable: ^2.4.1

  # Networking
  dio: ^5.4.3
  retrofit: ^4.4.1

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.0.0

  # Media
  cached_network_image: ^3.3.1
  image_picker: ^1.1.1
  video_player: ^2.8.6
  photo_view: ^0.15.0
  chewie: ^1.7.6

  # UI
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^8.1.0
  badges: ^3.1.2
  fl_chart: ^1.2.0
  data_table_2: ^2.5.15
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^2.0.1

  # Audio / Calls
  audioplayers: ^6.0.0

  # Utilities
  intl: ^0.20.2
  timeago: ^3.6.1
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  collection: ^1.18.0
  path: ^1.9.0
  mime: ^2.0.0

  # Icons
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2719.1
  firebase_core: ^4.7.0
  get: ^4.7.3
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  share_plus: ^12.0.2
  flutter_sound: ^9.30.0
  camera: ^0.12.0+1
  firebase_messaging: ^16.2.0
  permission_handler: ^12.0.1
  contacts_service: ^0.6.3
  animated_text_kit: ^4.3.0
  agora_rtc_engine: ^6.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.3
  injectable_generator: ^2.4.2
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  retrofit_generator: ^10.2.5

flutter:
  uses-material-design: true
  assets:
    - assets/image/
    - assets/anim/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700